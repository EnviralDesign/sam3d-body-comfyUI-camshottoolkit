<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAM3D Offset Viewer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --sam-ar: 1; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #101010; color: #ddd; font-family: "Segoe UI", sans-serif; }
        #root {
            container-type: size;
            width: 100%;
            height: 100%;
            position: relative;
            background: #101010;
        }
        #stage-wrap {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        #stage {
            position: relative;
            width: min(100cqw, calc(100cqh * var(--sam-ar)));
            height: min(100cqh, calc(100cqw / var(--sam-ar)));
            max-width: 100%;
            max-height: 100%;
            pointer-events: auto;
            touch-action: none;
        }
        #canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #101010;
        }
        #hud {
            position: absolute;
            top: 8px;
            left: 8px;
            padding: 8px 10px;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            font-size: 11px;
            line-height: 1.35;
            max-width: calc(100% - 16px);
            pointer-events: none;
            z-index: 5;
        }
        #toolbar {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 8px;
            z-index: 6;
        }
        #toolbar button {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(0, 0, 0, 0.55);
            color: #eee;
            font-size: 11px;
            cursor: pointer;
        }
        #toolbar button:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        #error {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(0, 0, 0, 0.82);
            color: #ffb3b3;
            text-align: center;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="root">
        <div id="stage-wrap">
            <div id="stage">
                <canvas id="canvas"></canvas>
                <div id="hud">Waiting for node execution.</div>
                <div id="toolbar">
                    <button id="resetViewButton" type="button">Reset View</button>
                </div>
                <div id="error"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from "./three.module.js";
        import { ArcballControls } from "./ArcballControls.js";

        const root = document.getElementById("root");
        const stage = document.getElementById("stage");
        const canvas = document.getElementById("canvas");
        const hud = document.getElementById("hud");
        const errorEl = document.getElementById("error");
        const resetViewButton = document.getElementById("resetViewButton");

        let renderer = null;
        let scene = null;
        let camera = null;
        let controls = null;
        let ambientLight = null;
        let keyLight = null;
        let fillLight = null;
        let rimLight = null;
        let mesh = null;
        let uiPayload = null;
        let nodeState = null;
        let lastStateSignature = "";
        let lastMeshSignature = "";
        let lastAppliedCameraSignature = "";
        let lastSentInteractiveState = "";
        let lastParameterCameraState = null;
        let frameRequested = false;

        function parseJson(value, fallback) {
            try {
                return JSON.parse(value);
            } catch {
                return fallback;
            }
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function deg2rad(value) {
            return (value * Math.PI) / 180.0;
        }

        function vec3From(value, fallback = [0, 0, 0]) {
            if (Array.isArray(value) && value.length === 3) {
                return new THREE.Vector3(
                    Number(value[0]) || 0,
                    Number(value[1]) || 0,
                    Number(value[2]) || 0,
                );
            }
            return new THREE.Vector3(fallback[0], fallback[1], fallback[2]);
        }

        function resolveLighting(preset, ambient, key, fill, rim) {
            if (preset === "flat") {
                return [Math.max(ambient, 0.6), key * 0.55, Math.max(fill, key * 0.45), rim * 0.15];
            }
            if (preset === "dramatic") {
                return [ambient * 0.45, key * 1.35, fill * 0.35, Math.max(rim, key * 0.9)];
            }
            return [ambient, key, fill, rim];
        }

        function sphericalOffset(yawDeg, pitchDeg, radius) {
            const yaw = deg2rad(yawDeg);
            const pitch = deg2rad(pitchDeg);
            return new THREE.Vector3(
                radius * Math.cos(pitch) * Math.sin(yaw),
                radius * Math.sin(pitch),
                radius * Math.cos(pitch) * Math.cos(yaw),
            );
        }

        function showError(message) {
            errorEl.style.display = "flex";
            errorEl.textContent = message;
        }

        function hideError() {
            errorEl.style.display = "none";
            errorEl.textContent = "";
        }

        function getRenderIntrinsics() {
            const renderSize = parseJson(uiPayload?.render_size?.[0] || "{}", {});
            const width = Math.max(Number(renderSize.width) || 512, 1);
            const height = Math.max(Number(renderSize.height) || 512, 1);
            return {
                width,
                height,
                fx: Number(renderSize.fx) || (0.9 * Math.min(width, height)),
                fy: Number(renderSize.fy) || (0.9 * Math.min(width, height)),
                cx: Number(renderSize.cx) || (width * 0.5),
                cy: Number(renderSize.cy) || (height * 0.5),
            };
        }

        function updateAspectBox() {
            const intr = getRenderIntrinsics();
            root.style.setProperty("--sam-ar", `${intr.width / intr.height}`);
        }

        function ensureViewer() {
            if (renderer) {
                return;
            }
            renderer = new THREE.WebGLRenderer({
                canvas,
                antialias: true,
                alpha: false,
                preserveDrawingBuffer: false,
            });
            renderer.setPixelRatio(window.devicePixelRatio || 1);
            renderer.outputColorSpace = THREE.SRGBColorSpace;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, 1, 0.01, 10000);
            camera.position.set(0, 0, 2);
            camera.up.set(0, 1, 0);

            ambientLight = new THREE.AmbientLight(0xffffff, 0.35);
            keyLight = new THREE.PointLight(0xffffff, 14.0, 0, 2);
            fillLight = new THREE.PointLight(0xffffff, 6.0, 0, 2);
            rimLight = new THREE.PointLight(0xffffff, 8.0, 0, 2);
            scene.add(ambientLight, keyLight, fillLight, rimLight);

            controls = new ArcballControls(camera, renderer.domElement, scene);
            controls.enableAnimations = false;
            controls.setGizmosVisible(false);
            controls.addEventListener("change", () => {
                emitInteractiveState();
                requestRender();
            });

            window.addEventListener("resize", () => {
                resizeRenderer();
                requestRender();
            });
        }

        function resizeRenderer() {
            if (!renderer) {
                return;
            }
            const rect = stage.getBoundingClientRect();
            const width = Math.max(Math.round(rect.width), 1);
            const height = Math.max(Math.round(rect.height), 1);
            renderer.setSize(width, height, false);
        }

        function applyProjection() {
            const intr = getRenderIntrinsics();
            const near = 0.01;
            const far = 10000.0;
            const left = (-intr.cx * near) / intr.fx;
            const right = ((intr.width - intr.cx) * near) / intr.fx;
            const top = (intr.cy * near) / intr.fy;
            const bottom = (-(intr.height - intr.cy) * near) / intr.fy;
            camera.near = near;
            camera.far = far;
            camera.projectionMatrix.makePerspective(left, right, top, bottom, near, far);
            camera.projectionMatrixInverse.copy(camera.projectionMatrix).invert();
        }

        function stateFromCamera() {
            if (!camera || !controls) {
                return null;
            }
            camera.updateMatrixWorld(true);
            const target = controls.target.clone();
            const e = camera.matrixWorld.elements;
            return {
                camera_pose: [
                    [e[0], e[4], e[8], e[12]],
                    [e[1], e[5], e[9], e[13]],
                    [e[2], e[6], e[10], e[14]],
                    [e[3], e[7], e[11], e[15]],
                ],
                camera_position: [camera.position.x, camera.position.y, camera.position.z],
                camera_target: [target.x, target.y, target.z],
                camera_up: [e[4], e[5], e[6]],
                pivot_x: target.x,
                pivot_y: target.y,
                pivot_z: target.z,
                distance: camera.position.distanceTo(target),
            };
        }

        function parseCameraState(raw, fallback = null) {
            const parsed = parseJson(raw, null);
            if (!parsed || typeof parsed !== "object") {
                return fallback;
            }
            if (Array.isArray(parsed.camera_position) && Array.isArray(parsed.camera_target)) {
                return {
                    camera_pose: Array.isArray(parsed.camera_pose) && parsed.camera_pose.length === 4 ? parsed.camera_pose : null,
                    camera_position: [
                        Number(parsed.camera_position[0]) || 0,
                        Number(parsed.camera_position[1]) || 0,
                        Number(parsed.camera_position[2]) || 0,
                    ],
                    camera_target: [
                        Number(parsed.camera_target[0]) || 0,
                        Number(parsed.camera_target[1]) || 0,
                        Number(parsed.camera_target[2]) || 0,
                    ],
                    camera_up: Array.isArray(parsed.camera_up) && parsed.camera_up.length === 3
                        ? [
                            Number(parsed.camera_up[0]) || 0,
                            Number(parsed.camera_up[1]) || 1,
                            Number(parsed.camera_up[2]) || 0,
                        ]
                        : [0, 1, 0],
                    pivot_x: Number(parsed.pivot_x) || 0,
                    pivot_y: Number(parsed.pivot_y) || 0,
                    pivot_z: Number(parsed.pivot_z) || 0,
                    distance: Number(parsed.distance) || 0,
                };
            }
            return fallback;
        }

        function applyCameraState(state) {
            if (!state || !camera || !controls) {
                return;
            }
            const position = vec3From(state.camera_position, [0, 0, 2]);
            const target = vec3From(state.camera_target, [0, 0, 0]);
            const up = vec3From(state.camera_up, [0, 1, 0]);

            controls.enabled = false;
            camera.position.copy(position);
            controls.target.copy(target);
            if (Array.isArray(state.camera_pose) && state.camera_pose.length === 4) {
                const rows = state.camera_pose;
                const matrix = new THREE.Matrix4().set(
                    Number(rows[0]?.[0]) || 1, Number(rows[0]?.[1]) || 0, Number(rows[0]?.[2]) || 0, Number(rows[0]?.[3]) || 0,
                    Number(rows[1]?.[0]) || 0, Number(rows[1]?.[1]) || 1, Number(rows[1]?.[2]) || 0, Number(rows[1]?.[3]) || 0,
                    Number(rows[2]?.[0]) || 0, Number(rows[2]?.[1]) || 0, Number(rows[2]?.[2]) || 1, Number(rows[2]?.[3]) || 0,
                    Number(rows[3]?.[0]) || 0, Number(rows[3]?.[1]) || 0, Number(rows[3]?.[2]) || 0, Number(rows[3]?.[3]) || 1,
                );
                const scale = new THREE.Vector3();
                matrix.decompose(camera.position, camera.quaternion, scale);
                camera.up.copy(up.normalize());
            } else {
                camera.up.copy(up);
                camera.lookAt(target);
            }
            camera.updateMatrixWorld(true);
            controls.update();
            controls.enabled = true;
        }

        function applyMesh() {
            const meshPayloadRaw = uiPayload?.preview_mesh?.[0] || "";
            if (!meshPayloadRaw || meshPayloadRaw === lastMeshSignature) {
                return;
            }
            lastMeshSignature = meshPayloadRaw;

            const meshPayload = parseJson(meshPayloadRaw, null);
            if (!meshPayload || !Array.isArray(meshPayload.vertices) || !Array.isArray(meshPayload.faces)) {
                throw new Error("Invalid preview mesh payload");
            }

            if (mesh) {
                scene.remove(mesh);
                mesh.geometry.dispose();
                mesh.material.dispose();
                mesh = null;
            }

            const vertices = new Float32Array(meshPayload.vertices.flat());
            const flatFaces = meshPayload.faces.flat();
            const faces = flatFaces.length > 65535 ? new Uint32Array(flatFaces) : new Uint16Array(flatFaces);

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute("position", new THREE.BufferAttribute(vertices, 3));
            geometry.setIndex(new THREE.BufferAttribute(faces, 1));
            geometry.computeVertexNormals();
            geometry.computeBoundingSphere();

            const material = new THREE.MeshStandardMaterial({
                color: new THREE.Color(
                    clamp((Number(nodeState?.mesh_r) || 235) / 255, 0, 1),
                    clamp((Number(nodeState?.mesh_g) || 235) / 255, 0, 1),
                    clamp((Number(nodeState?.mesh_b) || 235) / 255, 0, 1),
                ),
                metalness: 0.0,
                roughness: 0.8,
                side: THREE.DoubleSide,
            });
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
        }

        function applyVisualSettings() {
            const previewLighting = parseJson(uiPayload?.preview_lighting?.[0] || "{}", {});
            const bg = Array.isArray(previewLighting.bg_color)
                ? previewLighting.bg_color
                : parseJson(uiPayload?.bg_color?.[0] || "[]", []);
            const bgColor = new THREE.Color(
                clamp((Number(bg[0]) || Number(nodeState?.bg_r) || 16) / 255, 0, 1),
                clamp((Number(bg[1]) || Number(nodeState?.bg_g) || 16) / 255, 0, 1),
                clamp((Number(bg[2]) || Number(nodeState?.bg_b) || 16) / 255, 0, 1),
            );
            renderer.setClearColor(bgColor, 1.0);
            const bgCss = `rgb(${Math.round(bgColor.r * 255)}, ${Math.round(bgColor.g * 255)}, ${Math.round(bgColor.b * 255)})`;
            document.body.style.background = bgCss;
            root.style.background = bgCss;
            stage.style.background = bgCss;
            canvas.style.background = bgCss;

            if (mesh && mesh.material) {
                const meshColor = Array.isArray(previewLighting.mesh_color) ? previewLighting.mesh_color : null;
                mesh.material.color.setRGB(
                    clamp((Number(meshColor?.[0]) || Number(nodeState?.mesh_r) || 235) / 255, 0, 1),
                    clamp((Number(meshColor?.[1]) || Number(nodeState?.mesh_g) || 235) / 255, 0, 1),
                    clamp((Number(meshColor?.[2]) || Number(nodeState?.mesh_b) || 235) / 255, 0, 1),
                );
            }

            const target = controls?.target || new THREE.Vector3();
            const [ambient, key, fill, rim] = Array.isArray(previewLighting.bg_color)
                ? [
                    Number(previewLighting.ambient_intensity ?? 0.35),
                    Number(previewLighting.key_intensity ?? 14.0),
                    Number(previewLighting.fill_intensity ?? 6.0),
                    Number(previewLighting.rim_intensity ?? 8.0),
                ]
                : resolveLighting(
                    String(nodeState?.lighting_preset || "studio"),
                    Number(nodeState?.ambient_intensity ?? 0.35),
                    Number(nodeState?.key_intensity ?? 14.0),
                    Number(nodeState?.fill_intensity ?? 6.0),
                    Number(nodeState?.rim_intensity ?? 8.0),
                );

            ambientLight.intensity = ambient;
            keyLight.intensity = key;
            fillLight.intensity = fill;
            rimLight.intensity = rim;

            if (Array.isArray(previewLighting.key_position)) {
                keyLight.position.copy(vec3From(previewLighting.key_position));
            } else {
                const meshRadius = mesh?.geometry?.boundingSphere?.radius || 1.0;
                const lightRadius = Math.max(meshRadius * 2.5, 2.5);
                const keyYaw = Number(nodeState?.key_yaw ?? 35.0);
                const keyPitch = Number(nodeState?.key_pitch ?? 35.0);
                keyLight.position.copy(target).add(sphericalOffset(keyYaw, keyPitch, lightRadius));
            }
            if (Array.isArray(previewLighting.fill_position)) {
                fillLight.position.copy(vec3From(previewLighting.fill_position));
            } else {
                const meshRadius = mesh?.geometry?.boundingSphere?.radius || 1.0;
                const lightRadius = Math.max(meshRadius * 2.5, 2.5);
                const keyYaw = Number(nodeState?.key_yaw ?? 35.0);
                const keyPitch = Number(nodeState?.key_pitch ?? 35.0);
                fillLight.position.copy(target).add(sphericalOffset(keyYaw - 55.0, Math.max(10.0, keyPitch * 0.45), lightRadius * 0.92));
            }
            if (Array.isArray(previewLighting.rim_position)) {
                rimLight.position.copy(vec3From(previewLighting.rim_position));
            } else {
                const meshRadius = mesh?.geometry?.boundingSphere?.radius || 1.0;
                const lightRadius = Math.max(meshRadius * 2.5, 2.5);
                const keyYaw = Number(nodeState?.key_yaw ?? 35.0);
                const keyPitch = Number(nodeState?.key_pitch ?? 35.0);
                rimLight.position.copy(target).add(sphericalOffset(keyYaw + 180.0, Math.max(15.0, keyPitch * 0.7), lightRadius * 1.08));
            }
        }

        function updateHud() {
            if (!nodeState?.show_viewer_hud) {
                hud.style.display = "none";
                return;
            }
            hud.style.display = "block";
            const state = stateFromCamera();
            hud.innerHTML = `
                <div>cam ${state.camera_position.map((v) => v.toFixed(3)).join(", ")}</div>
                <div>target ${state.camera_target.map((v) => v.toFixed(3)).join(", ")}</div>
                <div>up ${state.camera_up.map((v) => v.toFixed(3)).join(", ")}</div>
                <div style="opacity:.75">${nodeState?.use_interactive_view ? "interactive view active" : "parameter view active"}</div>
                <div style="opacity:.75">Arcball: drag to tumble, wheel to dolly, right-drag to pan</div>
            `;
        }

        function resetToParameterView() {
            if (!lastParameterCameraState) {
                return;
            }
            lastAppliedCameraSignature = JSON.stringify(lastParameterCameraState);
            applyCameraState(lastParameterCameraState);
            emitInteractiveState();
            requestRender();
        }

        function requestRender() {
            if (frameRequested) {
                return;
            }
            frameRequested = true;
            requestAnimationFrame(() => {
                frameRequested = false;
                if (!renderer || !scene || !camera) {
                    return;
                }
                resizeRenderer();
                applyProjection();
                renderer.render(scene, camera);
                updateHud();
            });
        }

        function emitInteractiveState() {
            const state = stateFromCamera();
            if (!state) {
                return;
            }
            const serialized = JSON.stringify(state);
            if (serialized === lastSentInteractiveState) {
                return;
            }
            lastSentInteractiveState = serialized;
            parent.postMessage({
                type: "SAM3D_OFFSET_VIEWER_STATE",
                nodeId: Number(nodeState?.nodeId || 0),
                interactive_state: serialized,
            }, "*");
        }

        function chooseCameraState() {
            const fallback = parseCameraState(uiPayload?.parameter_camera_state?.[0] || "", null);
            if (nodeState?.use_interactive_view) {
                const interactive = parseCameraState(nodeState?.interactive_state || "", null);
                if (interactive) {
                    return interactive;
                }
            }
            const active = parseCameraState(uiPayload?.active_camera_state?.[0] || "", fallback);
            return active || fallback;
        }

        function handleStateMessage(data) {
            uiPayload = data.ui || {};
            nodeState = data.state || {};
            nodeState.nodeId = Number(nodeState.nodeId || 0);
            lastParameterCameraState = parseCameraState(uiPayload?.parameter_camera_state?.[0] || "", null);

            const signature = JSON.stringify({
                mesh: uiPayload.preview_mesh?.[0] || "",
                active: uiPayload.active_camera_state?.[0] || "",
                param: uiPayload.parameter_camera_state?.[0] || "",
                intr: uiPayload.render_size?.[0] || "",
                bg: uiPayload.bg_color?.[0] || "",
                state: nodeState,
            });
            if (signature === lastStateSignature) {
                return;
            }
            lastStateSignature = signature;

            try {
                hideError();
                ensureViewer();
                updateAspectBox();
                applyMesh();
                const cameraState = chooseCameraState();
                const cameraSig = JSON.stringify(cameraState || {});
                if (cameraState && cameraSig !== lastAppliedCameraSignature) {
                    lastAppliedCameraSignature = cameraSig;
                    applyCameraState(cameraState);
                }
                applyVisualSettings();
                requestRender();
            } catch (error) {
                console.error(error);
                showError(error?.message || String(error));
            }
        }

        window.addEventListener("message", (event) => {
            const data = event?.data;
            if (!data || data.type !== "SAM3D_OFFSET_STATE") {
                return;
            }
            handleStateMessage(data);
        });

        resetViewButton?.addEventListener("click", () => {
            resetToParameterView();
        });
    </script>
</body>
</html>
